name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff
        run: |
          uv run --group dev ruff check src tests
          uv run --group dev ruff format --check src tests
      - name: Mypy
        run: uv run --group dev mypy

  # The base tier must import and pass with no optional dependency installed;
  # optional-dependency tests are expected to skip, never fail.
  test-base:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync (base install + dev tools)
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -q

  # The full tier exercises every optional stack: JAX, blackjax, meshpy,
  # pyproj, cartopy (and netCDF4 once it joins the mesh extra).
  test-all-extras:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync (all extras + dev tools)
        run: uv sync --dev --all-extras
      - name: Run tests
        run: uv run pytest -q

  # Verify the declared dependency floor (numpy/scipy/matplotlib minimums in
  # pyproject.toml) actually works, so the floor is a tested contract rather
  # than a guess.
  test-oldest-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Sync with lowest direct resolution
        run: uv sync --dev --resolution lowest-direct
      - name: Show resolved versions
        run: uv pip list | grep -Ei 'numpy|scipy|matplotlib'
      - name: Run tests
        run: uv run pytest -q
